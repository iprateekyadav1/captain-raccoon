name: 🦝 Generate Captain Raccoon Episode

on:
  # Manual trigger with optional topic
  workflow_dispatch:
    inputs:
      topic:
        description: "Episode topic (leave blank for random)"
        required: false
        default: ""
      theme:
        description: "Content pillar theme (leave blank for random)"
        required: false
        default: ""
      publish:
        description: "Publish to YouTube + Instagram?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  # Scheduled: generate 3x per week at 6 AM UTC
  schedule:
    - cron: "0 6 * * 1"   # Monday
    - cron: "0 6 * * 3"   # Wednesday
    - cron: "0 6 * * 5"   # Friday

env:
  ENVIRONMENT: production
  PYTHON_VERSION: "3.11"

jobs:
  generate:
    name: 🎬 Generate Episode
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Inject secrets via Doppler ────────────────────────────────────────
      - name: Install Doppler CLI
        run: |
          curl -sLf --retry 3 --tlsv1.2 \
            "https://cli.doppler.com/install.sh" | sudo sh

      - name: Run pipeline with Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- python -m captain_raccoon.scripts.generate_episode \
            --topic "${{ github.event.inputs.topic }}" \
            --theme "${{ github.event.inputs.theme }}" \
            --publish "${{ github.event.inputs.publish || 'true' }}"

      # ── Upload output artifacts ───────────────────────────────────────────
      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: episode-${{ github.run_number }}
          path: |
            output/episodes/**/*_final.mp4
            output/episodes/**/thumbnail.jpg
          retention-days: 7

      # ── Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Pipeline failed - Run #${context.runNumber}`,
              body: `Episode generation failed.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure']
            })
